---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.0
  name: nicfirmwaretemplates.configuration.net.nvidia.com
spec:
  group: configuration.net.nvidia.com
  names:
    kind: NicFirmwareTemplate
    listKind: NicFirmwareTemplateList
    plural: nicfirmwaretemplates
    singular: nicfirmwaretemplate
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: NicFirmwareTemplate is the Schema for the nicfirmwaretemplates
          API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: NicFirmwareTemplateSpec defines the FW templates and node/nic
              selectors for it
            properties:
              nicSelector:
                description: NIC selector configuration
                properties:
                  nicType:
                    description: Type of the NIC to be selected, e.g. 101d,1015,a2d6
                      etc.
                    type: string
                  partNumbers:
                    description: Part numbers of the NICs to be selected, e.g. MCX713106AEHEA_QP1
                    items:
                      type: string
                    type: array
                  pciAddresses:
                    description: Array of PCI addresses to be selected, e.g. "0000:03:00.0"
                    items:
                      pattern: ^[0-9a-fA-F]{4}:[0-9a-fA-F]{2}:[0-9a-fA-F]{2}\.[0-7]$
                      type: string
                    type: array
                  serialNumbers:
                    description: |-
                      Serial numbers of the NICs to be selected, e.g. MT2116X09299. Note: serial numbers
                      are not guaranteed unique — on systems with embedded NICs that share a flashed VPD
                      image (e.g. HGX B300), multiple physical cards report the same serial, and this
                      selector will match all of them. Use `pciAddresses` for precise per-card selection
                      on such systems.
                    items:
                      type: string
                    type: array
                required:
                - nicType
                type: object
              nodeSelector:
                additionalProperties:
                  type: string
                description: NodeSelector contains labels required on the node. When
                  empty, the template will be applied to matching devices on all nodes.
                type: object
              template:
                description: Firmware update template
                properties:
                  nicFirmwareSourceRef:
                    description: NicFirmwareSourceRef refers to existing NicFirmwareSource
                      CR on where to get the FW from
                    type: string
                  updatePolicy:
                    description: UpdatePolicy indicates whether the operator needs
                      to validate installed FW or upgrade it
                    enum:
                    - Validate
                    - Update
                    type: string
                required:
                - nicFirmwareSourceRef
                - updatePolicy
                type: object
            required:
            - nicSelector
            - template
            type: object
          status:
            description: NicTemplateStatus defines the observed state of NicConfigurationTemplate
              and NicFirmwareTemplate
            properties:
              conditions:
                description: Conditions observed for this template, e.g. a Network
                  Bay pairing imbalance on a node
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              nicDevices:
                description: NicDevice CRs matching this configuration / firmware
                  template
                items:
                  type: string
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
